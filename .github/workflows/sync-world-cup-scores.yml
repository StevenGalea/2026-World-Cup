name: Sync Live World Cup Scores

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch:  # Allow manual trigger
  push:
    branches:
      - develop
    paths:
      - 'scripts/sync-scores.js'
      - '.github/workflows/sync-world-cup-scores.yml'

permissions:
  contents: write

jobs:
  sync-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install axios

      - name: Fetch and update scores
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/sync-scores.js

      - name: Commit changes
        run: |
          git config user.name "World Cup Sync Bot"
          git config user.email "bot@github.local"
          git add scores.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "⚽ Auto-update World Cup scores" && git push)
